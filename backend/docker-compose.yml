services:
  db:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: hevy
      POSTGRES_PASSWORD: hevy
      POSTGRES_DB: hevy
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hevy -d hevy"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
